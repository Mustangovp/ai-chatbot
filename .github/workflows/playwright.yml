name: APEX E2E Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Node Dependencies
      run: |
        npm init -y
        npm install -D @playwright/test wait-on

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Start Application Server
      run: |
        export APEX_SECRET="ci-github-secret-signing-key"
        export OPENAI_API_KEY="sk-ci-mock-openai-key"
        export STRIPE_SECRET_KEY="sk_test_ci-mock-stripe"
        python app.py &
      env:
        PORT: 5000

    - name: Wait for Application Health
      run: npx wait-on http://localhost:5000/app --timeout 30000

    - name: Run Playwright Tests
      run: npx playwright test --config=tests/playwright/playwright.config.js
      env:
        CI: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload Test Failures (Screenshots & Videos)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-failures
        path: test-results/
        retention-days: 14
