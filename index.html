<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APEX MIND</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:95%;
max-width:1000px;
height:94vh;
background:#111;
border:1px solid #1f1f1f;
border-radius:24px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:24px;
border-bottom:1px solid #1f1f1f;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo h1{
font-size:28px;
font-weight:800;
letter-spacing:1px;
}

.logo p{
color:#777;
margin-top:4px;
font-size:14px;
}

.status{
color:#4ade80;
font-size:14px;
}

.chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
}

.message{
max-width:80%;
padding:18px;
border-radius:18px;
line-height:1.7;
white-space:pre-wrap;
font-size:15px;
}

.bot{
background:#181818;
border:1px solid #222;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.input-area{
padding:20px;
border-top:1px solid #1f1f1f;
display:flex;
gap:12px;
}

input{
flex:1;
padding:18px;
border:none;
outline:none;
border-radius:16px;
background:#181818;
color:white;
font-size:15px;
}

button{
padding:18px 28px;
border:none;
border-radius:16px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.9;
}

.loading{
opacity:0.7;
font-style:italic;
}

@media(max-width:700px){

.message{
max-width:100%;
}

.logo h1{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<h1>APEX MIND</h1>
<p>Elite Physique Intelligence</p>
</div>

<div class="status">
● ONLINE
</div>

</div>

<div class="chat" id="chat">

<div class="message bot">
Welcome to APEX MIND.

Elite bodybuilding intelligence for serious physique development.

Ask about:
- hypertrophy
- cutting
- nutrition
- supplements
- recovery
- contest prep
- muscle growth
</div>

</div>

<div class="input-area">

<input id="msg" placeholder="Ask your bodybuilding question...">

<button onclick="send()">
Send
</button>

</div>

</div>

<script>

async function send(){

let msg=document.getElementById("msg").value;
let chat=document.getElementById("chat");

if(!msg) return;

chat.innerHTML += `
<div class="message user">
${msg}
</div>
`;

document.getElementById("msg").value="";

let loading=document.createElement("div");

loading.className="message bot loading";

loading.innerText="APEX MIND is analyzing...";

chat.appendChild(loading);

chat.scrollTop=chat.scrollHeight;

try{

let res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:msg
})
});

let data=await res.json();

loading.remove();

chat.innerHTML += `
<div class="message bot">
${data.reply}
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(error){

loading.remove();

chat.innerHTML += `
<div class="message bot">
System error. Please try again.
</div>
`;

}

}

document.getElementById("msg").addEventListener("keypress",function(event){

if(event.key==="Enter"){
send();
}

});

</script>

</body>
</html>
