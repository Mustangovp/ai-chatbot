<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse AI | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
            border: 1px solid rgba(34, 211, 238, 0.5);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div class="glass w-full max-w-md h-[90vh] rounded-[40px] flex flex-col overflow-hidden relative border border-white/10 shadow-2xl">
        
        <div class="p-6 pb-2">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold tracking-widest text-cyan-400 uppercase">Level 1 Rookie</span>
                <span id="xp-display" class="text-xs bg-cyan-500/20 text-cyan-300 px-3 py-1 rounded-full border border-cyan-500/30">0 XP</span>
            </div>
            <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                <div id="xp-bar" class="bg-cyan-500 h-full transition-all duration-500" style="width: 5%"></div>
            </div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
            <div class="animate__animated animate__fadeInUp bg-white/5 p-4 rounded-2xl rounded-bl-none border border-white/5 max-w-[85%]">
                <p class="text-sm">Йо! Аз съм твоят AI треньор. Готов ли си да станеш машина днес? 🔥</p>
            </div>
        </div>

        <div class="px-6 py-2 flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="quickSend('Дай ми 5 мин тренировка')" class="whitespace-nowrap bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs hover:bg-cyan-500/20 transition-all">⚡ 5 мин енергия</button>
            <button onclick="quickSend('Какво да ям за мускули?')" class="whitespace-nowrap bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs hover:bg-cyan-500/20 transition-all">🍎 Храна за маса</button>
            <button onclick="quickSend('Мотивирай ме!')" class="whitespace-nowrap bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs hover:bg-cyan-500/20 transition-all">🚀 Мотивация</button>
        </div>

        <div class="p-6">
            <div class="relative flex items-center gap-2">
                <div class="flex-1 bg-white/5 neon-border rounded-2xl flex items-center px-4">
                    <input type="text" id="user-input" 
                        class="w-full bg-transparent py-4 text-sm focus:outline-none"
                        placeholder="Питай ме нещо...">
                </div>
                <button onclick="sendMessage()" class="bg-cyan-500 p-4 rounded-2xl hover:scale-105 active:scale-90 transition-all shadow-lg shadow-cyan-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-black" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let xp = 0;
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const xpDisplay = document.getElementById('xp-display');
        const xpBar = document.getElementById('xp-bar');

        function updateXP() {
            xp += 20;
            xpDisplay.innerText = `${xp} XP`;
            let progress = (xp % 100);
            xpBar.style.width = `${progress}%`;
            if(progress === 0 && xp > 0) alert("LEVEL UP! Ти си звяр! 🏆");
        }

        async function quickSend(text) {
            userInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            appendMessage(message, 'user');
            
            // "Typing" effect
            const typingDiv = document.createElement('div');
            typingDiv.className = "text-xs text-cyan-400 animate-pulse px-2";
            typingDiv.innerText = "Треньорът мисли...";
            typingDiv.id = "typing-status";
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                document.getElementById('typing-status').remove();
                appendMessage(data.reply, 'ai');
                updateXP();
            } catch (e) {
                document.getElementById('typing-status').remove();
                appendMessage("Нещо прекъсна връзката. Пробвай пак! ⚠️", 'ai');
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            const isAi = sender === 'ai';
            div.className = `p-4 rounded-2xl max-w-[85%] text-sm animate__animated ${isAi ? 'bg-white/5 border border-white/10 rounded-bl-none animate__fadeInLeft' : 'bg-cyan-500 text-black font-bold ml-auto rounded-br-none animate__fadeInRight'}`;
            div.innerHTML = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
