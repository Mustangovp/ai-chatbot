<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympia AI Coach</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:white;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:900px;
    height:92vh;
    background:#111;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border:1px solid #222;
}

.header{
    padding:20px;
    border-bottom:1px solid #222;
}

.header h1{
    font-size:28px;
}

.header p{
    color:#888;
    margin-top:5px;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    padding:15px;
    border-radius:14px;
    max-width:80%;
    line-height:1.5;
}

.user{
    align-self:flex-end;
    background:#2563eb;
}

.bot{
    align-self:flex-start;
    background:#1c1c1c;
}

.input-area{
    display:flex;
    padding:20px;
    border-top:1px solid #222;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1a1a1a;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    margin-left:10px;
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.loading{
    color:#888;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🏆 Olympia AI Coach</h1>
<p>Elite bodybuilding intelligence</p>
</div>

<div id="chat">
<div class="message bot">
Welcome to Olympia AI Coach. Ask anything about bodybuilding, nutrition, supplements, prep or muscle growth.
</div>
</div>

<div class="input-area">
<input id="msg" placeholder="Ask your bodybuilding question...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
async function send() {

    let msg = document.getElementById("msg").value;
    let chat = document.getElementById("chat");

    if (!msg) return;

    chat.innerHTML += `
        <div class="message user">
            ${msg}
        </div>
    `;

    document.getElementById("msg").value = "";

    let loading = document.createElement("div");
    loading.className = "message bot loading";
    loading.innerText = "Olympia AI is thinking...";
    chat.appendChild(loading);

    chat.scrollTop = chat.scrollHeight;

    let res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: msg
        })
    });

    let data = await res.json();

    loading.remove();

    chat.innerHTML += `
        <div class="message bot">
            ${data.reply}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        send();
    }

});
</script>

</body>
</html>
