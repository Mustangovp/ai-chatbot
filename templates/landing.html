<style>
:root{
  --bg:#0B0E14; --surface:#121724; --surface2:#1A2133;
  --text:#F2F5FA; --muted:#8B93A7;
  --brand:#F5212D; --ember:#FF6A3C; --amber:#FFB13C;
  --cyan:#38E0FF; --lime:#B6FF3C; --steel:#8B9AFF;
  --pulse:linear-gradient(90deg,#F5212D,#FF6A3C);
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px;}
a{color:inherit;}
img{max-width:100%;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;max-width:1100px;margin:0 auto;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;font-family:'Unbounded';font-weight:700;font-size:14px;letter-spacing:.5px;text-decoration:none;}
.logo img{width:34px;height:34px;filter:drop-shadow(0 0 10px rgba(245,33,45,.5));}
.nav-right{display:flex;align-items:center;gap:12px;}
.lang-toggle{display:flex;border:1px solid rgba(255,255,255,.15);border-radius:20px;overflow:hidden;font-size:12px;font-weight:800;}
.lang-toggle span{padding:6px 11px;cursor:pointer;color:var(--muted);}
.lang-toggle span.active{background:var(--pulse);color:#fff;}
.nav-cta{background:var(--pulse);color:#fff;font-weight:800;font-size:13px;padding:10px 18px;border-radius:30px;text-decoration:none;box-shadow:0 4px 16px rgba(245,33,45,.3);white-space:nowrap;}

/* HERO */
.hero{padding:42px 0 26px;text-align:center;position:relative;}
.hero::before{content:'';position:absolute;top:-130px;left:50%;transform:translateX(-50%);width:640px;height:420px;background:radial-gradient(ellipse,rgba(245,33,45,.15),transparent 65%);pointer-events:none;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--cyan);background:rgba(56,224,255,.08);border:1px solid rgba(56,224,255,.25);padding:6px 14px;border-radius:30px;margin-bottom:20px;position:relative;}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--lime);animation:blink 1.6s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
h1{font-family:'Unbounded';font-weight:900;font-size:clamp(28px,6vw,54px);line-height:1.12;letter-spacing:-.5px;position:relative;}
h1 .grad{background:var(--pulse);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero .sub{color:var(--muted);font-size:clamp(14.5px,2.5vw,17.5px);max-width:560px;margin:16px auto 0;font-weight:500;position:relative;}

/* INTERACTIVE GOAL LINE — mirrors what people type in Google */
.goal-line{margin:26px auto 0;max-width:560px;background:var(--surface);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);padding:20px 18px;position:relative;box-shadow:0 14px 50px rgba(0,0,0,.4);}
.goal-line .gl-text{font-size:clamp(16px,3.4vw,21px);font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;line-height:1.9;}
.goal-line select{appearance:none;-webkit-appearance:none;background:var(--surface2);border:1.5px solid rgba(245,33,45,.5);color:var(--text);font-family:'Unbounded';font-weight:700;font-size:clamp(14px,3vw,17px);padding:7px 28px 7px 14px;border-radius:12px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23F5212D'/></svg>");background-repeat:no-repeat;background-position:right 10px center;}
.goal-line .gl-btn{display:block;width:100%;margin-top:16px;background:var(--pulse);color:#fff;border:none;font-family:'Manrope';font-weight:800;font-size:16.5px;padding:16px;border-radius:14px;cursor:pointer;box-shadow:0 8px 28px rgba(245,33,45,.38);transition:transform .15s;}
.goal-line .gl-btn:active{transform:scale(.98);}
.goal-line .gl-alt{margin-top:12px;font-size:13px;color:var(--muted);}
.goal-line .gl-alt a{color:var(--cyan);font-weight:700;text-decoration:none;}
.micro{color:var(--muted);font-size:12.5px;margin-top:14px;position:relative;}

/* payment strip under hero */
.paystrip{display:flex;justify-content:center;align-items:center;gap:9px;flex-wrap:wrap;margin-top:18px;position:relative;}
.paystrip .ps-label{width:100%;text-align:center;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.paystrip img{height:24px;width:auto;border-radius:4px;background:#fff;padding:2px 5px;}
.paystrip img.dark{background:#000;}

/* honest counter */
.proof{display:none;align-items:center;gap:8px;background:var(--surface);border:1px solid rgba(255,255,255,.1);padding:8px 16px;border-radius:30px;font-size:13px;font-weight:700;margin-top:16px;position:relative;}
.proof.show{display:inline-flex;}
.proof .p-num{color:var(--lime);font-family:'Unbounded';font-size:14px;}

/* pulse line */
.pulseline{width:min(520px,86%);height:54px;margin:22px auto 0;display:block;position:relative;}
.pulseline path{fill:none;stroke:url(#pgrad);stroke-width:3;stroke-linecap:round;stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 2.4s ease forwards .3s;}
@keyframes draw{to{stroke-dashoffset:0;}}
@media (prefers-reduced-motion:reduce){.pulseline path{animation:none;stroke-dashoffset:0;}.eyebrow .dot{animation:none;}.ring{animation:none;}}

/* PHONE */
.phone-stage{display:flex;justify-content:center;padding:40px 0 8px;position:relative;}
.ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:370px;height:370px;border-radius:50%;border:2px solid transparent;background:conic-gradient(from 180deg,var(--brand),var(--ember),var(--amber),var(--cyan),var(--lime),var(--brand)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.3;animation:spin 14s linear infinite;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
/* PHONE = ОГЛЕДАЛО на реалния /app интерфейс (стилове 1:1 от app.html) */
.phone{position:relative;width:308px;background:var(--bg);border:1px solid rgba(255,255,255,.12);border-radius:36px;padding:12px 0 0;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(245,33,45,.14);overflow:hidden;}
.phone .notch{width:90px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 10px;}
.ph-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1);background:var(--surface);}
.ph-brand{display:flex;align-items:center;gap:8px;}
.ph-logo{width:26px;height:26px;border-radius:6px;background:url('/static/logo.png') center/cover no-repeat;box-shadow:0 0 12px rgba(245,33,45,.45);}
.ph-title{font-family:'Unbounded';font-size:10.5px;letter-spacing:.5px;line-height:1.2;}
.ph-title .ra{color:var(--brand);}
.ph-sub{font-size:8px;color:var(--muted);font-weight:600;}
.ph-badge{font-family:'Unbounded';font-size:8px;letter-spacing:1px;padding:4px 8px;border:1px solid rgba(255,255,255,.4);color:var(--text);border-radius:20px;background:rgba(255,255,255,.06);}
.chat{display:flex;flex-direction:column;gap:10px;font-size:12.5px;padding:14px 12px;min-height:285px;}
.bub{padding:10px 13px;border-radius:12px;max-width:88%;line-height:1.55;}
.bub.u{background:var(--pulse);color:var(--text);align-self:flex-end;border-bottom-right-radius:4px;font-weight:600;}
.bub.a{background:linear-gradient(135deg,rgba(18,23,36,.95),rgba(26,33,51,.95));border:1px solid rgba(255,255,255,.1);border-left:3px solid var(--brand);align-self:flex-start;border-bottom-left-radius:4px;color:#E5E9F2;}
.ph-input{display:flex;gap:8px;padding:10px 12px 14px;border-top:1px solid rgba(255,255,255,.1);background:var(--surface);}
.ph-input .ph-field{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--muted);}
.ph-input .ph-send{width:38px;height:38px;border-radius:10px;background:var(--pulse);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 4px 14px rgba(245,33,45,.4);flex-shrink:0;}
.phone-old{position:relative;width:300px;background:#0E1220;border:1px solid rgba(255,255,255,.1);border-radius:36px;padding:14px 12px 18px;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(245,33,45,.14);}
.phone .notch{width:90px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 12px;}
.chat{display:flex;flex-direction:column;gap:10px;font-size:13px;}
.bub{padding:10px 14px;border-radius:16px;max-width:88%;}
.bub.u{background:var(--pulse);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;font-weight:600;}
.bub.a{background:var(--surface2);align-self:flex-start;border-bottom-left-radius:4px;}
.plan-card{background:var(--surface2);border:1px solid rgba(56,224,255,.25);border-radius:16px;padding:12px;width:100%;}
.plan-card .pc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.plan-card .pc-title{font-weight:800;font-size:12.5px;}
.plan-card .pc-kcal{font-size:11px;color:var(--lime);font-weight:700;background:rgba(182,255,60,.1);padding:3px 8px;border-radius:20px;}
.plan-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-top:1px solid rgba(255,255,255,.07);gap:8px;}
.plan-row span:last-child{color:var(--muted);flex-shrink:0;}
.typing{display:flex;gap:4px;align-self:flex-start;padding:10px 14px;background:var(--surface2);border-radius:16px;border-bottom-left-radius:4px;}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--brand);animation:tp 1.2s infinite;}
.typing i:nth-child(2){animation-delay:.2s;background:var(--ember);}
.typing i:nth-child(3){animation-delay:.4s;background:var(--amber);}
@keyframes tp{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-4px);opacity:1;}}

/* SECTIONS */
section{padding:56px 0;}
.sec-label{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:10px;}
h2{font-family:'Unbounded';font-weight:700;font-size:clamp(21px,4vw,32px);line-height:1.2;margin-bottom:8px;}
.sec-sub{color:var(--muted);font-size:15px;max-width:540px;}

/* HOW IT WORKS */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:30px;}
.step{background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:22px;}
.step .s-num{font-family:'Unbounded';font-weight:900;font-size:30px;background:var(--pulse);-webkit-background-clip:text;background-clip:text;color:transparent;}
.step h3{font-size:16px;font-weight:800;margin:10px 0 6px;}
.step p{font-size:13.5px;color:var(--muted);}

/* GOALS */
.goals{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:30px;}
.goal{position:relative;border-radius:var(--radius);padding:24px 22px;text-decoration:none;color:#fff;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:var(--surface);transition:transform .15s;display:block;}
.goal:active{transform:scale(.98);}
.goal::before{content:'';position:absolute;inset:0;opacity:.16;}
.goal.burn::before{background:linear-gradient(135deg,#F5212D,#FF6A3C);}
.goal.zero::before{background:linear-gradient(135deg,#38E0FF,#3C7BFF);}
.goal.muscle::before{background:linear-gradient(135deg,#6B7CFF,#9D6BFF);}
.goal.elite::before{background:linear-gradient(135deg,#FFB13C,#D4AF37);}
.goal .g-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;position:relative;}
.goal.burn .g-ico{background:rgba(245,33,45,.2);}
.goal.zero .g-ico{background:rgba(56,224,255,.18);}
.goal.muscle .g-ico{background:rgba(107,124,255,.2);}
.goal.elite .g-ico{background:rgba(255,177,60,.2);}
.goal h3{font-family:'Unbounded';font-weight:700;font-size:15.5px;margin-bottom:8px;position:relative;}
.goal p{font-size:13.5px;color:var(--muted);position:relative;}
.goal .go{margin-top:14px;font-weight:800;font-size:13px;position:relative;}
.goal.burn .go{color:#FF6A3C;}
.goal.zero .go{color:var(--cyan);}
.goal.muscle .go{color:#8B9AFF;}
.goal.elite .go{color:#FFB13C;}

/* PRICING */
.plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:30px;align-items:start;}
.plan{background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:28px 24px;}
.plan.hot{border:2px solid transparent;background:linear-gradient(var(--surface),var(--surface)) padding-box,var(--pulse) border-box;position:relative;}
.plan.hot .tag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--pulse);font-size:11px;font-weight:800;letter-spacing:1px;padding:5px 16px;border-radius:20px;white-space:nowrap;}
.plan .p-name{font-family:'Unbounded';font-weight:700;font-size:14px;letter-spacing:1px;}
.plan .p-price{font-family:'Unbounded';font-weight:900;font-size:36px;margin:12px 0 2px;}
.plan .p-price span{font-size:14px;color:var(--muted);font-weight:500;font-family:'Manrope';}
.plan .p-day{font-size:12.5px;color:var(--lime);font-weight:700;margin-bottom:16px;}
.plan ul{list-style:none;margin:0 0 22px;}
.plan li{font-size:14px;padding:7px 0;color:#C9D0DF;display:flex;gap:9px;align-items:flex-start;}
.plan li::before{content:'✓';color:var(--lime);font-weight:800;flex-shrink:0;}
.plan li.off{color:var(--muted);opacity:.55;}
.plan li.off::before{content:'—';}
.p-btn{display:block;text-align:center;font-weight:800;font-size:15px;padding:14px;border-radius:14px;text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.2);cursor:pointer;background:none;width:100%;font-family:'Manrope';}
.plan.hot .p-btn{background:var(--pulse);border:none;box-shadow:0 6px 24px rgba(245,33,45,.32);}

/* TRUST BLOCK */
.trustblock{margin-top:24px;background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:20px;text-align:center;}
.trustblock .tb-logos{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.trustblock .tb-logos img{height:28px;width:auto;border-radius:5px;background:#fff;padding:3px 6px;}
.trustblock .tb-logos img.dark{background:#000;}
.trustblock .tb-row{font-size:13px;color:#C9D0DF;padding:3px 0;}
.trustblock .tb-row b{color:var(--text);}

/* FAQ */
.faq-item{background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.faq-item summary{padding:16px 18px;font-weight:700;font-size:14.5px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.faq-item summary::after{content:'+';font-family:'Unbounded';color:var(--brand);font-size:18px;flex-shrink:0;}
.faq-item[open] summary::after{content:'−';}
.faq-item .fa-body{padding:0 18px 16px;font-size:13.5px;color:var(--muted);}

/* divider */
.divider{width:100%;height:40px;opacity:.45;}
.divider path{fill:none;stroke:url(#pgrad2);stroke-width:2;}

/* FOOTER */
footer{padding:40px 0 80px;text-align:center;color:var(--muted);font-size:12.5px;border-top:1px solid rgba(255,255,255,.07);margin-top:30px;}
footer a{color:var(--muted);text-decoration:none;}
footer a:hover{color:var(--text);}
.foot-links{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:12px;}

/* COOKIE BAR */
.cookiebar{position:fixed;bottom:12px;left:12px;right:12px;max-width:560px;margin:0 auto;background:var(--surface2);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:14px 16px;font-size:12.5px;color:#C9D0DF;display:none;gap:10px;align-items:center;z-index:999;box-shadow:0 10px 40px rgba(0,0,0,.55);flex-wrap:wrap;}
.cookiebar.show{display:flex;}
.cookiebar .cb-text{flex:1;min-width:180px;}
.cookiebar button{border:none;color:#fff;font-weight:800;font-size:12px;padding:9px 16px;border-radius:10px;cursor:pointer;font-family:'Manrope';}
.cookiebar .cb-accept{background:var(--pulse);}
.cookiebar .cb-decline{background:none;border:1px solid rgba(255,255,255,.25);}

/* LEGAL MODAL */
#legal-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;overflow-y:auto;padding:24px 16px;}
#legal-modal.active{display:block;}
#legal-modal .lm-box{max-width:720px;margin:0 auto;background:var(--surface);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);padding:28px 24px;position:relative;}
#legal-modal .lm-close{position:sticky;top:0;float:right;background:var(--surface2);border:1px solid rgba(255,255,255,.2);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;}
#legal-content{font-size:13.5px;color:#C9D0DF;}
#legal-content h2{font-size:20px;margin-bottom:12px;}
#legal-content h3{font-size:15px;margin:16px 0 6px;color:var(--text);}
#legal-content p,#legal-content li{margin-bottom:8px;}
#legal-content ul{padding-left:18px;}

/* SCROLL TO TOP */
.to-top{position:fixed;bottom:74px;right:16px;width:46px;height:46px;border-radius:50%;background:var(--pulse);color:#fff;border:none;font-size:19px;cursor:pointer;z-index:998;box-shadow:0 6px 22px rgba(245,33,45,.4);display:none;align-items:center;justify-content:center;transition:transform .15s;}
.to-top.show{display:flex;}
.to-top:active{transform:scale(.92);}
</style>
</head>

<header class="her
