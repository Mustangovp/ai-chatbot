<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX MIND | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        .apex-card { flex: 1; display: flex; flex-direction: column; border: 2px solid #ff0000; background: #050505; margin: 5px; border-radius: 20px; overflow: hidden; }
        .neon-red { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-family: 'Orbitron'; text-transform: uppercase; }
        
        /* ТАБЛИЦА СЪС СКРОЛ ЗА МОБИЛНИ */
        .msg-content { overflow-x: auto; width: 100%; }
        .msg-content table { min-width: 400px; border-collapse: collapse; margin: 15px 0; border: 1px solid #ff0000; background: rgba(30, 0, 0, 0.8); }
        .msg-content th { background: #ff0000; color: white; padding: 12px; font-size: 11px; text-transform: uppercase; border: 1px solid #440000; }
        .msg-content td { border: 1px solid #440000; padding: 10px; font-size: 11px; text-align: center; color: #fff; }
        .msg-content h3 { color: #ff0000 !important; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }

        .msg-ai { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #ff0000; border-radius: 0 15px 15px 15px; margin-right: 20px; }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); border-radius: 15px 15px 0 15px; margin-left: 20px; font-weight: bold; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .input-area { background: #000; padding: 10px; border-top: 1px solid rgba(255,0,0,0.3); }

        /* PREMUM LOCK */
        .locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .unlock-btn { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff0000; color: #fff; text-transform: uppercase; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="apex-card">
        <div class="p-4 border-b border-red-900/30 flex items-center justify-between bg-black">
            <div class="flex items-center gap-3">
                <img src="/static/logo.png" class="w-10 h-10 object-contain shadow-[0_0_10px_#f00]" onerror="this.src='https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png'">
                <div>
                    <h1 class="neon-red text-sm tracking-widest">APEX MIND</h1>
                    <p id="session-counter" class="text-[8px] text-red-500 font-bold tracking-[3px]">● 3 FREE SESSIONS LEFT</p>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div id="utility" class="px-4 py-2 hidden flex flex-col gap-2 bg-black/80">
            <div class="flex gap-2 locked">
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] font-bold">📋 КОПИРАЙ ПЛАНА</button>
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] font-bold">💾 ЗАПАЗИ (PDF)</button>
            </div>
            <button onclick="alert('Плащане чрез Revolut/Stripe: 1.99€')" class="unlock-btn w-full py-3 rounded-xl shadow-[0_0_15px_rgba(255,0,0,0.3)]">
                🔒 ОТКЛЮЧИ ИНСТРУМЕНТИТЕ ЗА 1.99€
            </button>
        </div>

        <div class="input-area">
            <div class="flex items-center gap-2 bg-[#111] p-1 rounded-2xl border border-white/10">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Напиши целта си тук...">
                <button onclick="sendMsg()" class="bg-red-600 p-4 rounded-xl shadow-[0_0_15px_#f00]">
                    <svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let count = 0;
        const chatBox = document.getElementById('chat-box');
        const userIn = document.getElementById('user-in');

        window.onload = () => {
            appendMsg("### СИСТЕМАТА Е АКТИВНА 🔱\nИмаш **3 безплатни сесии**. Каква е твоята фитнес цел?", 'ai');
        };

        async function sendMsg() {
            const val = userIn.value.trim();
            if(!val || count >= 3) {
                if(count >= 3) alert("Лимитът е достигнат! Отключи Elite достъп.");
                return;
            }
            userIn.value = ''; count++;
            
            document.getElementById('session-counter').innerText = `● ${3 - count} FREE SESSIONS LEFT`;
            if(count === 3) document.getElementById('session-counter').innerText = "● LIMIT REACHED";

            appendMsg(val, 'user');
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) { appendMsg("Връзката прекъсна. Пробвай пак. 🔴", 'ai'); }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const formatted = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-5 max-w-[92%] text-sm msg-content shadow-2xl">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userIn.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>
