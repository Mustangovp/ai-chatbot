<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX PULSE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; --neon-red: #ff0000; --matrix-green: #39ff14; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        
        .app-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #150000 0%, #000 100%); overflow: hidden; }
        
        /* ТАБЛИЦИ - ЧЕТИМИ И ЕЛЕГАНТНИ */
        .msg-ai table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid var(--matrix-green); font-size: 10px; background: rgba(0,0,0,0.8); }
        .msg-ai th { background: var(--matrix-green); color: #000; padding: 12px; text-transform: uppercase; font-family: 'Orbitron'; font-weight: bold; }
        .msg-ai td { border: 1px solid rgba(57, 255, 20, 0.2); color: #ffffff; padding: 10px; text-align: center; }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 1; }
        .msg-ai { background: rgba(20, 20, 20, 0.9); border-left: 4px solid var(--neon-red); border-radius: 0 20px 20px 20px; padding: 20px; max-width: 94%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,0,0,0.1); }
        .msg-user { background: linear-gradient(135deg, #ff0000 0%, #800000 100%); border-radius: 20px 20px 0 20px; padding: 12px 20px; max-width: 85%; align-self: flex-end; font-weight: 700; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }

        #paywall { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(15px); }
        .premium-card { background: #0a0a0a; border: 1px solid var(--neon-red); padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 0 60px rgba(255,0,0,0.5); width: 100%; max-width: 340px; }

        .btn-pay { background: var(--neon-red); color: white; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; }
        .btn-pay:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-red); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="p-5 flex items-center justify-between border-b border-red-900/20 bg-black/60 z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full border border-red-600 flex items-center justify-center">
                    <span class="text-[10px] font-bold">APEX</span>
                </div>
                <div>
                    <h1 class="text-red-600 font-bold tracking-[3px] text-xs uppercase font-['Orbitron']">APEX PULSE PRO</h1>
                    <p id="counter" class="text-[8px] text-gray-500 font-bold uppercase tracking-[2px]">3 Сесии Остават</p>
                </div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer class="p-5 bg-black/90 z-10 border-t border-white/5">
            <div class="flex items-center gap-3 bg-white/5 rounded-2xl p-1.5 border border-white/10 focus-within:border-red-600 transition-all">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Опиши целта си тук...">
                <button onclick="send()" class="bg-red-600 p-4 rounded-xl active:scale-95 transition-all"><svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
        </footer>
    </div>

    <div id="paywall">
        <div class="premium-card">
            <h2 class="text-2xl font-bold mb-4 uppercase font-['Orbitron'] tracking-tighter">Limit Reached</h2>
            <div class="text-5xl font-black mb-2 tracking-tight text-white">1.99€</div>
            <p class="text-[10px] text-gray-500 mb-8 uppercase tracking-widest italic">По-евтино от кафе. По-ценно от злато.</p>
            <button onclick="pay()" class="btn-pay">ОТКЛЮЧИ СЕГА</button>
        </div>
    </div>

    <script>
        let count = 0;
        const box = document.getElementById('chat-box');

        window.onload = () => {
            appendMsg("### СИСТЕМАТА Е ОНЛАЙН 🔱\nДобре дошъл в **APEX PULSE PRO**. Готов ли си да пренапишеш лимитите си?", 'ai');
        };

        async function send() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val) return;
            if(count >= 3) { document.getElementById('paywall').style.display = 'flex'; return; }
            
            appendMsg(val, 'user');
            input.value = ''; 
            count++;
            document.getElementById('counter').innerText = `${3 - count} Сесии Остават`;

            try {
                const res = await fetch("/chat", { 
                    method: "POST", 
                    headers: {"Content-Type": "application/json"}, 
                    body: JSON.stringify({ message: val }) 
                });
                const data = await res.json();
                appendMsg(data.reply || "Грешка в отговора.", 'ai');
            } catch(e) { 
                appendMsg("Грешка при връзката със сървъра. ⚡", 'ai'); 
            }
        }

        async function pay() {
            try {
                const res = await fetch("/create-checkout-session", { method: "POST" });
                const data = await res.json();
                if(data.url) window.location.href = data.url;
                else alert("Stripe не е конфигуриран правилно.");
            } catch(e) { alert("Грешка при плащането."); }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = type === 'user' ? 'msg-user' : 'msg-ai';
            div.innerHTML = type === 'user' ? text : marked.parse(text);
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
