<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MIND | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        .apex-card { border: 2px solid #ff0000; box-shadow: 0 0 50px rgba(255, 0, 0, 0.3); background: #050505; border-radius: 20px; }
        .neon-red { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-family: 'Orbitron'; }
        
        .msg-content table { width: 100%; border-collapse: collapse; margin: 15px 0; background: rgba(255,255,255,0.02); }
        .msg-content th { background: #ff0000; color: white; padding: 10px; font-size: 12px; text-transform: uppercase; border: 1px solid #400000; }
        .msg-content td { border: 1px solid #222; padding: 10px; font-size: 12px; color: #ddd; text-align: center; }
        .msg-content h3 { color: #ff0000; font-size: 1.3rem; margin-top: 1.5rem; font-weight: 700; border-bottom: 2px solid #222; padding-bottom: 0.5rem; }

        .msg-ai { background: #0a0a0a; border-left: 4px solid #ff0000; border-radius: 0 20px 20px 20px; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); border-radius: 20px 20px 0 20px; font-weight: bold; }
        .action-btn { background: #111; border: 1px solid #ff0000; color: #fff; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        
        #chat-box { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-2 sm:p-4">

    <div class="apex-card w-full max-w-2xl h-[95vh] flex flex-col overflow-hidden">
        
        <div class="p-6 border-b border-red-900/40 flex items-center justify-between bg-black">
            <div class="flex items-center gap-4">
                <img src="/static/logo.png" onerror="this.src='https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png'" class="w-14 h-14 object-contain filter drop-shadow(0 0 8px #f00)">
                <div>
                    <h1 class="neon-red text-xl sm:text-2xl tracking-tighter uppercase">APEX MIND</h1>
                    <p class="text-[9px] text-red-500 font-bold tracking-[4px] animate-pulse uppercase">Olympia AI Active</p>
                </div>
            </div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-8">
            </div>

        <div id="utility" class="px-8 py-2 flex gap-3 hidden">
            <button onclick="copyIt()" class="action-btn flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">📋 Копирай плана</button>
            <button onclick="window.print()" class="action-btn flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">💾 Запази (PDF)</button>
        </div>

        <div class="p-6 bg-black border-t border-white/5">
            <div class="flex items-center gap-4 bg-[#0d0d0d] p-2 rounded-2xl border border-white/10 focus-within:border-red-600 transition-all">
                <input type="text" id="user-in" 
                    class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white placeholder:text-gray-600" 
                    placeholder="Задай цел (напр. 'Искам план за сила')..."
                    autocomplete="off">
                <button id="send-btn" class="bg-red-600 p-4 rounded-xl shadow-[0_0_15px_rgba(255,0,0,0.5)] active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let rawText = "";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-in');
        const sendBtn = document.getElementById('send-btn');

        // ВЪВЕДЕНИЕ ПРИ СТАРТИРАНЕ
        window.onload = () => {
            const intro = `### ДОБРЕ ДОШЪЛ В APEX MIND 🔱
Аз съм твоят елитен AI ментор, програмиран по стандартите на професионалния бодибилдинг. 

**Какво мога да направя за теб:**
* 🦾 **Персонализирани планове:** Тренировки за сила, маса или релеф.
* 🥗 **Елитно хранене:** Макроси, изчислени до грам.
* 🧪 **Биохакинг:** Оптимизация на възстановяването и съня.
* 📊 **Периодизация:** Професионални таблици и графици.

**Напиши целта си под текста и да започваме. 'Train the body. Master the mind.'** 🔴`;
            appendMsg(intro, 'ai');
        };

        async function startAction() {
            const msg = userInput.value.trim();
            if(!msg) return;
            userInput.value = '';
            
            appendMsg(msg, 'user');
            
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                rawText = data.reply;
                appendMsg(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) {
                appendMsg("Грешка в системата. Опитай пак. 🔴", 'ai');
            }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const formatted = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-6 max-w-[95%] shadow-2xl msg-content text-sm">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ФИКС ЗА ENTER И КЛИК
        sendBtn.onclick = startAction;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') startAction(); };

        function copyIt() {
            navigator.clipboard.writeText(rawText);
            alert("Планът е копиран чисто! ✅");
        }
    </script>
</body>
</html>
