<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX PULSE | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; --neon-red: #ff0000; --soft-green: #39ff14; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        
        .app-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top, #1a0000 0%, #000 100%); }

        /* ФОНОВО ЛОГО (УАУ ЕФЕКТ) */
        .bg-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; opacity: 0.07; z-index: 0; pointer-events: none; }

        /* ТАБЛИЦИ - ЕЛЕГАНТНИ, НЕ НАТРАПЧИВИ */
        .msg-ai table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid rgba(57, 255, 20, 0.3); font-size: 11px; background: rgba(0,0,0,0.4); }
        .msg-ai th { background: rgba(57, 255, 20, 0.1); color: var(--soft-green); padding: 10px; text-transform: uppercase; font-family: 'Orbitron'; font-size: 9px; border-bottom: 1px solid var(--soft-green); }
        .msg-ai td { border-bottom: 1px solid rgba(255,255,255,0.05); color: #ffffff; padding: 10px; text-align: center; }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 1; }
        .msg-ai { background: rgba(255, 255, 255, 0.03); border-left: 3px solid var(--neon-red); border-radius: 0 20px 20px 20px; padding: 20px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .msg-user { background: linear-gradient(135deg, #ff0000 0%, #800000 100%); border-radius: 20px 20px 0 20px; padding: 12px 20px; align-self: flex-end; font-weight: 700; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }

        /* ПРЕМИУМ ИНТРО КАРТА */
        .welcome-card { background: rgba(255, 0, 0, 0.05); border: 1px solid var(--neon-red); padding: 25px; border-radius: 25px; margin-bottom: 10px; text-align: center; }

        /* PAYWALL */
        #paywall { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .premium-card { background: #0a0a0a; border: 1px solid var(--neon-red); padding: 40px; border-radius: 40px; text-align: center; width: 100%; max-width: 340px; }

        .btn-main { background: var(--neon-red); color: white; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <img src="{{ url_for('static', filename='logo.png') }}" class="bg-logo">

        <header class="p-5 flex items-center justify-between border-b border-white/5 bg-black/40 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='logo.png') }}" class="w-10 h-10 object-contain rounded-full border border-red-600">
                <div>
                    <h1 class="text-red-600 font-bold tracking-[3px] text-xs uppercase font-['Orbitron']">APEX PULSE PRO</h1>
                    <p id="counter" class="text-[8px] text-gray-500 font-bold tracking-[2px]">3 СЕСИИ ОСТАВАТ</p>
                </div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer class="p-5 bg-black/90 z-10">
            <div class="flex items-center gap-3 bg-white/5 rounded-2xl p-1 border border-white/10 focus-within:border-red-600">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-4 px-4 text-sm outline-none text-white" placeholder="Напиши своята цел тук...">
                <button onclick="send()" class="bg-red-600 p-4 rounded-xl shadow-lg"><svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
        </footer>
    </div>

    <div id="paywall">
        <div class="premium-card">
            <h2 class="text-2xl font-bold mb-4 uppercase font-['Orbitron']">LIMIT REACHED</h2>
            <div class="text-5xl font-black mb-2">1.99€</div>
            <p class="text-[10px] text-gray-400 mb-8 uppercase tracking-widest italic">По-евтино от кафе. По-ценно от злато.</p>
            <button onclick="pay()" class="btn-main shadow-lg shadow-red-600/30">ОТКЛЮЧИ СЕГА</button>
        </div>
    </div>

    <script>
        let count = 0;
        const box = document.getElementById('chat-box');

        window.onload = () => {
            const intro = `
                <div class="welcome-card">
                    <h2 class="text-red-600 font-bold mb-3 font-['Orbitron'] text-lg">ДОБРЕ ДОШЪЛ В APEX PULSE PRO 🔱</h2>
                    <p class="text-gray-300 text-xs leading-relaxed px-4">
                        Ти активира достъп до най-мощния AI за биохакинг. Тук пренаписваме твоя генетичен потенциал.
                    </p>
                </div>
            `;
            const div = document.createElement('div');
            div.innerHTML = intro;
            box.appendChild(div);
        };

        async function send() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val) return;
            if(count >= 3) { document.getElementById('paywall').style.display = 'flex'; return; }
            
            appendMsg(val, 'user');
            input.value = ''; count++;
            document.getElementById('counter').innerText = `${3 - count} СЕСИИ ОСТАВАТ`;

            try {
                const res = await fetch("/chat", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ message: val }) });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
            } catch(e) { appendMsg("Грешка в системата. ⚡", 'ai'); }
        }

        async function pay() {
            const res = await fetch("/create-checkout-session", { method: "POST" });
            const data = await res.json();
            window.location.href = data.url;
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = type === 'user' ? 'msg-user' : 'msg-ai';
            div.innerHTML = type === 'user' ? text : marked.parse(text);
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
