<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX MIND | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        .apex-card { flex: 1; display: flex; flex-direction: column; border: 1px solid #ff0000; background: #050505; margin: 5px; border-radius: 20px; overflow: hidden; }
        .neon-red { color: #ff0000; text-shadow: 0 0 10px #ff0000; font-family: 'Orbitron'; text-transform: uppercase; }
        
        /* ТАБЛИЦА - КОМПАКТНА И ЧЕРВЕНА */
        .msg-content table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #ff0000; font-size: 11px; }
        .msg-content th { background: #ff0000; color: #fff; padding: 6px; text-transform: uppercase; border: 1px solid #400000; }
        .msg-content td { border: 1px solid #333; padding: 6px; text-align: center; color: #fff !important; }
        .msg-content h3 { color: #ff0000 !important; font-size: 1.1rem; margin-top: 10px; font-weight: 700; }

        .msg-ai { background: rgba(255, 255, 255, 0.05); border-left: 3px solid #ff0000; border-radius: 0 15px 15px 15px; }
        .msg-user { background: #ff0000; border-radius: 15px 15px 0 15px; font-weight: bold; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* PAYWALL SCREEN */
        #paywall-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .price-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; width: 100%; max-width: 300px; margin: 10px 0; text-align: center; }
        .price-card.active { border-color: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
    </style>
</head>
<body>

    <div id="paywall-screen">
        <h2 class="neon-red text-xl mb-6">LIMIT REACHED 🔱</h2>
        <div class="price-card">
            <p class="text-gray-500 text-[10px] uppercase">One-Time Plan</p>
            <p class="text-2xl font-bold">29.90 лв.</p>
        </div>
        <div class="price-card active">
            <div class="bg-red-600 text-[8px] px-2 rounded-full inline-block mb-1">MOST POPULAR</div>
            <p class="text-white text-[10px] uppercase">Elite Monthly</p>
            <p class="text-3xl font-bold">19.90 лв.</p>
        </div>
        <button onclick="location.reload()" class="w-full max-w-[300px] bg-red-600 py-4 mt-6 rounded-xl font-bold uppercase tracking-widest">ОТКЛЮЧИ ДОСТЪП</button>
    </div>

    <div class="apex-card">
        <div class="p-4 border-b border-white/5 flex items-center justify-between bg-black">
            <div class="flex items-center gap-3">
                <img src="/static/logo.png" class="w-10 h-10 object-contain" onerror="this.src='https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png'">
                <div>
                    <h1 class="neon-red text-sm tracking-widest">APEX MIND</h1>
                    <p id="counter" class="text-[8px] text-red-500 font-bold tracking-[2px]">● 3 FREE SESSIONS LEFT</p>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div id="utility" class="px-4 py-2 hidden flex gap-2">
            <button class="flex-1 bg-white/5 border border-white/10 py-2 rounded-lg text-[9px] font-bold opacity-50">📋 КОПИРАЙ</button>
            <button class="flex-1 bg-white/5 border border-white/10 py-2 rounded-lg text-[9px] font-bold opacity-50">💾 ЗАПАЗИ</button>
        </div>

        <div class="p-4 bg-black border-t border-white/5">
            <div class="flex items-center gap-2 bg-[#111] p-1 rounded-xl border border-white/10 focus-within:border-red-600">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Напиши целта си...">
                <button onclick="sendAction()" class="bg-red-600 p-3 rounded-xl shadow-lg">
                    <svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.visualViewport.addEventListener('resize', setHeight); setHeight();

        let count = 0;
        const chatBox = document.getElementById('chat-box');
        const userIn = document.getElementById('user-in');

        window.onload = () => {
            const intro = `### ДОБРЕ ДОШЪЛ В ЕЛИТА 🔱\nАз съм твоят **APEX MIND** асистент. 🦾\n\n**Какво получаваш:**\n* 🍗 **Елитно хранене**\n* 🏋️ **Професионални тренировки**\n* 📈 **Пълна трансформация**\n\nИмаш **3 безплатни сесии**. Дай газ! 🚀`;
            appendMsg(intro, 'ai');
        };

        async function sendAction() {
            const val = userIn.value.trim();
            if(!val) return;

            if(count >= 3) {
                document.getElementById('paywall-screen').style.display = 'flex';
                return;
            }

            userIn.value = '';
            count++;
            document.getElementById('counter').innerText = `● ${3 - count} FREE SESSIONS LEFT`;

            appendMsg(val, 'user');
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) { appendMsg("System Offline. 🔴", 'ai'); }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const formatted = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-4 max-w-[95%] text-sm msg-content">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userIn.onkeypress = (e) => { if(e.key === 'Enter') sendAction(); };
    </script>
</body>
</html>
