    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; --neon: #ff0000; --matrix: #39ff14; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        .app-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; overflow: hidden; }
        .bg-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; opacity: 0.15; z-index: 0; pointer-events: none; filter: grayscale(1); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 1; position: relative; }
        .msg-ai table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 2px solid var(--matrix); background: rgba(0, 10, 0, 0.9); }
        .msg-ai th { background: var(--matrix); color: #000; padding: 12px; text-transform: uppercase; font-size: 10px; font-family: 'Orbitron'; border: 1px solid #000; }
        .msg-ai td { border: 1px solid rgba(57, 255, 20, 0.4); color: #fff; padding: 10px; text-align: center; font-size: 11px; }
        .msg-ai { background: rgba(20, 20, 20, 0.95); border-left: 4px solid var(--neon); border-radius: 0 20px 20px 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .msg-user { background: linear-gradient(135deg, #ff0000 0%, #800000 100%); border-radius: 20px 20px 0 20px; padding: 14px 20px; align-self: flex-end; font-weight: 700; }
        .welcome-card { border: 2px solid var(--neon); background: rgba(255, 0, 0, 0.05); padding: 25px; border-radius: 24px; text-align: center; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .locked-tools { opacity: 0.2; filter: grayscale(1); pointer-events: none; transition: all 0.5s ease; }
        .legal-footer { background: #080808; padding: 15px; text-align: center; border-top: 1px solid #222; z-index: 20; flex-shrink: 0; position: relative; }
        .legal-footer a { color: #ffffff !important; font-size: 11px; margin: 0 10px; text-transform: uppercase; font-weight: bold; text-decoration: underline; cursor: pointer; }
        .legal-copy { font-size: 9px; color: #666; margin-top: 5px; }
        #legal-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; padding: 30px; overflow-y: auto; }
        .modal-close { color: var(--neon); font-family: 'Orbitron'; margin-bottom: 20px; font-weight: bold; border: 1px solid var(--neon); padding: 10px; cursor: pointer; width: fit-content; }
        #paywall { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .premium-card { background: #0a0a0a; border: 2px solid var(--neon); padding: 40px; border-radius: 40px; text-align: center; max-width: 340px; width: 100%; box-shadow: 0 0 50px rgba(255,0,0,0.5); }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <img src="{{ url_for('static', filename='logo.png') }}" class="bg-logo">
        <header class="p-4 border-b border-white/5 bg-black/60 flex items-center justify-between z-10">
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='logo.png') }}" class="w-8 h-8 rounded-full border border-red-600">
                <div>
                    <h1 class="text-red-600 font-bold tracking-[2px] text-xs uppercase font-['Orbitron']">APEX PULSE PRO</h1>
                    <p id="counter" class="text-[7px] text-gray-400 font-bold uppercase tracking-widest">● 3 Сесии Остават</p>
                </div>
            </div>
        </header>

        <div id="chat-box"></div>

        <div id="utility" class="px-6 py-2 flex flex-col gap-2 bg-black/80 z-10 hidden">
            <div id="tool-lock" class="flex gap-2 locked-tools">
                <button onclick="copyToClipboard()" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] font-bold uppercase">📋 Копирай</button>
                <button onclick="saveAsPDF()" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] font-bold uppercase">💾 Запази (PDF)</button>
            </div>
            <p class="unlock-info-btn text-[8px] text-red-500 font-bold uppercase text-center mt-1">🔓 Отключи инструментите за 1.99€</p>
        </div>

        <footer class="p-4 bg-black z-10">
            <div class="flex items-center gap-2 bg-neutral-900 rounded-2xl p-1 border border-white/10 focus-within:border-red-600">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Цел на тренировката...">
                <button onclick="send()" class="bg-red-600 p-4 rounded-xl shadow-lg active:scale-90 transition-transform"><svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
        </footer>

        <div class="legal-footer">
            <a onclick="showLegal('terms')">Общи Условия</a>
            <a onclick="showLegal('privacy')">Поверителност</a>
            <a onclick="showLegal('contact')">Контакт</a>
            <div class="legal-copy uppercase tracking-tighter">© 2026 APEX PULSE PRO. SECURE PAYMENTS BY STRIPE.</div>
        </div>
    </div>

    <div id="paywall">
        <div class="premium-card">
            <h2 class="text-red-600 font-bold mb-4 font-['Orbitron'] text-xl uppercase">Elite Unlock</h2>
            <div class="text-5xl font-black mb-2 text-white">1.99€</div>
            <p class="text-[11px] text-white font-bold mb-1 uppercase tracking-widest font-['Orbitron']">Пълен достъп за 30 дни</p>
            <p class="text-[9px] text-gray-500 mb-8 px-6 uppercase tracking-tighter">Неограничени планове, тренировки и AI поддръжка за един месец.</p>
            <button onclick="pay()" class="w-full bg-red-600 py-5 rounded-2xl font-bold uppercase shadow-lg shadow-red-600/40">Отключи сега</button>
            <button onclick="document.getElementById('paywall').style.display='none'" class="mt-4 text-[8px] text-gray-500 uppercase underline">Върни се в чата</button>
        </div>
    </div>

    <div id="legal-modal">
        <div onclick="this.parentElement.style.display='none'" class="modal-close">✕ ЗАТВОРИ</div>
        <div id="legal-content" class="text-gray-300 text-[10px] leading-relaxed font-light"></div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let count = 0;
        const box = document.getElementById('chat-box');

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('success') === 'true' || localStorage.getItem('isElitePulse') === 'true') {
                localStorage.setItem('isElitePulse', 'true');
                count = -999999;
                document.getElementById('tool-lock').classList.remove('locked-tools');
                if(document.querySelector('.unlock-info-btn')) document.querySelector('.unlock-info-btn').style.display = 'none';
                document.getElementById('counter').innerText = "● ELITE STATUS: ACTIVE";
                document.getElementById('counter').style.color = "#39ff14";
            }

            const introHTML = `
                <div class="welcome-card">
                    <h2 class="text-red-600 font-bold mb-4 font-['Orbitron'] text-lg uppercase">Добре дошъл в APEX PULSE PRO 🔱</h2>
                    <p class="text-white text-sm mb-4 font-bold">Аз съм твоят дигитален Рони Колман. Тук извиненията умират.</p>
                    <div class="text-left space-y-2 text-xs text-gray-200">
                        <p>🥩 **Елитно хранене:** Макроси до последното зрънце. 🥗</p>
                        <p>🏋️ **Тренировки:** Програми, от които тежестите треперят. 💥</p>
                        <p>🧠 **Дисциплина:** Резултатите живеят тук. 🔥</p>
                    </div>
                    <p class="text-red-500 font-bold mt-4 text-[10px] uppercase tracking-widest">Имаш 3 безплатни сесии. Дай газ! 🚀</p>
                </div>
            `;
            const div = document.createElement('div'); div.innerHTML = introHTML; box.appendChild(div);
        };

        async function send() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val) return;
            if(count >= 3) { document.getElementById('paywall').style.display = 'flex'; return; }
            appendMsg(val, 'user'); input.value = ''; 
            if(count >= 0) count++;
            if(count > 0) document.getElementById('counter').innerText = `● ${3 - count} Сесии Остават`;
            try {
                const res = await fetch("/chat", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ message: val }) });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) { appendMsg("Грешка в системата. ⚡", 'ai'); }
        }

        async function pay() {
            const res = await fetch("/create-checkout-session", { method: "POST" });
            const data = await res.json();
            window.location.href = data.url;
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = type === 'user' ? 'msg-user' : 'msg-ai';
            div.innerHTML = type === 'user' ? text : marked.parse(text);
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function copyToClipboard() {
            const lastMsg = document.querySelector('.msg-ai:last-child');
            if (lastMsg) {
                const text = lastMsg.innerText.replace(/🔱|ELITE STATUS: ACTIVE/g, '');
                navigator.clipboard.writeText(text); alert("Планът е копиран! 🔥");
            }
        }

        function saveAsPDF() {
            const lastMsg = document.querySelector('.msg-ai:last-child');
            const table = lastMsg ? lastMsg.querySelector('table') : null;
            if (!table) { alert("Първо генерирай режим!"); return; }

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { font-family: sans-serif; padding: 20px; color: #000; background: #fff; text-align: center; }
                        h1 { color: #ff0000; text-transform: uppercase; border-bottom: 2px solid #ff0000; padding-bottom: 10px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
                        th { background: #39ff14; color: #000; padding: 8px; border: 1px solid #000; font-size: 12px; }
                        td { padding: 8px; border: 1px solid #000; text-align: center; font-size: 11px; }
                    </style>
                </head>
                <body>
                    <h1>🔱 APEX PULSE PRO РЕЖИМ</h1>
                    ${table.outerHTML}
                    <p style="margin-top:20px; font-size:10px;">Генерирано от apexpulse.pro</p>
                    <script>
                        window.onload = function() { window.print(); }
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        function showLegal(type) {
            const modal = document.getElementById('legal-modal');
            const content = document.getElementById('legal-content');
            let html = "";
            if(type === 'terms') {
                html = `<h2 class='text-red-600 font-bold mb-2 uppercase text-xs'>Общи Условия</h2>
                <p class='mb-2'>1. Услуга: APEX PULSE PRO предоставя софтуерни услуги чрез ИИ. 2. Плащания: Еднократно плащане от 1.99€ отключва PRO функции за 30 дни. 3. Отказ от отговорност: Всички планове са с информативна цел. Консултирайте се с лекар преди започване на диета или тренировки. 4. Право на отказ: Съгласно чл. 57, ал. 13 от ЗЗП, потребителят губи правото си на отказ след предоставяне на цифровото съдържание.</p>`;
            } else if(type === 'privacy') {
                html = `<h2 class='text-red-600 font-bold mb-2 uppercase text-xs'>Поверителност</h2>
                <p class='mb-2'>1. Данни: Не събираме лични данни без Ваше съгласие. 2. Плащания: Всички финансови данни се обработват от Stripe. 3. Сигурност: Използваме SSL сертификати за защита на връзката. 4. Бисквитки: Използваме 'LocalStorage' единствено за да запомним Вашия платен абонамент в този браузър.</p>`;
            } else if(type === 'contact') {
                html = `<h2 class='text-red-600 font-bold mb-2 uppercase text-xs'>Контакт</h2>
                <p><b>Бранд:</b> APEX PULSE PRO<br><b>Имейл:</b> apexpulsepro@gmail.com<br><b>Локация:</b> Перник, България<br><b>Поддръжка:</b> 24/7 чрез ИИ или имейл.</p>`;
            }
            content.innerHTML = html; modal.style.display = 'flex';
        }
    </script>
</body>
</html>
