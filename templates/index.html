<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX PULSE | ELITE AI COACH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; --neon: #ff0000; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; }

        .app-wrapper {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
        }

        /* ПОПРАВКА НА ЛОГОТО - ВЕЧЕ СОЧИ КЪМ ТВОЯТА STATIC ПАПКА */
        .bg-logo-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 450px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
            animation: breath 10s ease-in-out infinite;
        }

        @keyframes breath { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.08; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.13; } }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; }
        .msg-ai { background: rgba(20, 20, 20, 0.7); border-left: 4px solid var(--neon); border-radius: 4px 20px 20px 20px; backdrop-filter: blur(12px); padding: 18px; max-width: 90%; border: 1px solid rgba(255,0,0,0.1); }
        .msg-user { background: linear-gradient(135deg, #ff0000 0%, #800000 100%); border-radius: 20px 20px 4px 20px; padding: 14px 20px; max-width: 85%; align-self: flex-end; font-weight: 700; box-shadow: 0 5px 20px rgba(255,0,0,0.3); }

        #paywall { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(15px); }
        .premium-card { background: #0a0a0a; border: 1px solid var(--neon); padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 0 50px rgba(255,0,0,0.3); width: 100%; max-width: 350px; }
        
        .btn-pay { background: var(--neon); padding: 18px; rounded-2xl; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 20px; box-shadow: 0 10px 30px rgba(255,0,0,0.4); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <img src="{{ url_for('static', filename='logo.png') }}" class="bg-logo-watermark" alt="Apex Pulse Core">

        <header class="p-5 flex items-center justify-between bg-black/40 backdrop-blur-md border-b border-white/5 z-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full border border-red-600 flex items-center justify-center bg-black">
                    <img src="{{ url_for('static', filename='logo.png') }}" class="w-6 h-6 object-contain">
                </div>
                <div>
                    <h1 class="text-red-600 font-bold tracking-[3px] text-sm uppercase font-['Orbitron']">APEX PULSE</h1>
                    <p id="counter" class="text-[8px] text-gray-500 font-bold uppercase tracking-[2px]">3 Сесии Остават</p>
                </div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer class="p-6 bg-black/80 backdrop-blur-xl border-t border-white/5 z-10">
            <div class="flex items-center gap-3 bg-white/5 rounded-2xl p-2 border border-white/10 focus-within:border-red-600 transition-all">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Напиши целта си...">
                <button onclick="send()" class="bg-red-600 p-4 rounded-xl shadow-lg">
                    <svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <div id="paywall">
        <div class="premium-card">
            <h2 class="text-2xl font-bold mb-4 uppercase">Limit Reached 🔱</h2>
            <p class="text-gray-500 text-xs mb-8">Вземи пълния си персонализиран режим и подкрепа.</p>
            <div class="text-5xl font-black mb-2">1.99€</div>
            <p class="text-[10px] text-red-500 uppercase tracking-widest mb-8">Еднократен достъп</p>
            <button onclick="location.reload()" class="btn-pay">Активирай сега</button>
        </div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let count = 0;
        const box = document.getElementById('chat-box');

        window.onload = () => {
            appendMsg("### СИСТЕМАТА Е ОНЛАЙН ⚡\nДобре дошъл в **APEX PULSE**. Аз съм твоят елитен AI треньор.\n\nИмаш **3 безплатни сесии**. Каква е целта ти днес?", 'ai');
        };

        async function send() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val) return;
            if(count >= 3) { document.getElementById('paywall').style.display = 'flex'; return; }

            appendMsg(val, 'user');
            input.value = '';
            count++;
            document.getElementById('counter').innerText = `${3 - count} Сесии Остават`;

            try {
                // Пътят /chat трябва да съвпада с твоя app.py
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMsg(data.response || data.reply, 'ai');
            } catch(e) {
                appendMsg("Грешка при връзката. Провери дали сървърът работи.", 'ai');
            }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = type === 'user' ? 'msg-user' : 'msg-ai';
            div.innerHTML = type === 'user' ? text : marked.parse(text);
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
