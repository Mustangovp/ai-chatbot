<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX MIND | OLYMPIA EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; }
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column;
        }
        .apex-card { 
            flex: 1; display: flex; flex-direction: column;
            border: 2px solid #ff0000; background: #050505; margin: 8px; border-radius: 25px; overflow: hidden;
        }
        .neon-red { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-family: 'Orbitron'; text-transform: uppercase; }
        
        /* ГРАФИЧНА ЧЕРВЕНА ТАБЛИЦА - ПРЕЦИЗНО СТИЛИЗИРАНА */
        .msg-content table { 
            width: 100%; border-collapse: collapse; margin: 15px 0; 
            border: 2px solid #ff0000 !important; background: rgba(10, 10, 10, 0.9); 
        }
        .msg-content th { 
            background: #ff0000 !important; color: #fff !important; padding: 12px 8px; 
            font-size: 11px; text-transform: uppercase; border: 1px solid #440000; 
        }
        .msg-content td { 
            border: 1px solid #333; padding: 10px 6px; font-size: 11px; 
            text-align: center; color: #ffffff !important; 
        }
        .msg-content tr:nth-child(even) { background: rgba(255, 0, 0, 0.05); }

        /* Текст на съобщенията */
        .msg-ai { background: rgba(255, 255, 255, 0.03); border-left: 5px solid #ff0000; border-radius: 0 20px 20px 20px; color: #fff !important; }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); border-radius: 20px 20px 0 20px; font-weight: bold; }
        .msg-content h3 { color: #ff0000 !important; font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .input-area { background: #000; padding: 15px; border-top: 1px solid rgba(255,0,0,0.3); }

        /* PREMIUM LOCK СИСТЕМА */
        .premium-lock { filter: grayscale(1) opacity(0.4); pointer-events: none; }
        .unlock-btn { 
            background: linear-gradient(45deg, #1a1a1a, #4a0000); 
            border: 1px solid #ff0000; color: #fff; font-size: 10px; font-weight: bold;
            box-shadow: 0 0 10px rgba(255,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="apex-card">
        <div class="p-6 border-b border-red-900/40 flex flex-col items-center justify-center bg-black">
            <div class="relative mb-2">
                <img src="https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png" 
                     class="w-24 h-24 sm:w-32 sm:h-32 object-contain drop-shadow-[0_0_20px_rgba(255,0,0,0.9)]">
            </div>
            <div class="text-center">
                <h1 class="neon-red text-2xl tracking-[5px]">APEX MIND</h1>
                <p id="counter-label" class="text-[10px] text-red-500 font-bold tracking-[4px] mt-1 uppercase">
                    ● 3 FREE SESSIONS LEFT
                </p>
            </div>
        </div>

        <div id="chat-box"></div>

        <div id="utility" class="px-6 py-2 flex flex-col gap-2 hidden">
            <div class="flex gap-2 premium-lock" id="lock-layer">
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] uppercase font-bold text-white">📋 Копирай плана</button>
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] uppercase font-bold text-white">💾 Запази (PDF)</button>
            </div>
            <button onclick="unlock()" class="unlock-btn w-full py-2 rounded-lg animate-pulse uppercase tracking-widest">
                🔓 Отключи Pro инструменти (1.99€)
            </button>
        </div>

        <div class="input-area">
            <div class="flex items-center gap-3 bg-[#0d0d0d] p-1 rounded-2xl border border-white/10 focus-within:border-red-600 transition-all">
                <input type="text" id="user-in" 
                    class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white font-medium" 
                    placeholder="Въведи цел (напр. План за маса)...">
                <button onclick="sendAction()" class="bg-red-600 p-4 rounded-xl shadow-[0_0_20px_#f00] active:scale-90 transition-all">
                    <svg class="h-6 w-6 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Фикс за височината
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let msgCount = 0;
        const chatBox = document.getElementById('chat-box');
        const userIn = document.getElementById('user-in');

        window.onload = () => {
            appendMsg("### ДОБРЕ ДОШЪЛ В ЕЛИТА 🔱\nИмаш **3 безплатни сесии** за пълен анализ. Дай газ! 🚀", 'ai');
        };

        async function sendAction() {
            const val = userIn.value.trim();
            if(!val || msgCount >= 3) return;
            userIn.value = ''; 
            
            msgCount++;
            const left = 3 - msgCount;
            document.getElementById('counter-label').innerText = left > 0 ? `● ${left} FREE SESSIONS LEFT` : "● LIMIT REACHED";
            
            appendMsg(val, 'user');
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) { appendMsg("System Error. 🔴", 'ai'); }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const formatted = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-6 max-w-[95%] text-sm msg-content shadow-2xl">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function unlock() {
            alert("Пренасочване към Stripe/PayPal за отключване на Pro функции...");
        }

        userIn.onkeypress = (e) => { if(e.key === 'Enter') sendAction(); };
    </script>
</body>
</html>
