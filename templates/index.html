<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MIND | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .apex-card { border: 1px solid rgba(255, 0, 0, 0.4); box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); background: #050505; }
        .neon-red { color: #ff0000; text-shadow: 0 0 12px #ff0000; font-family: 'Orbitron'; }
        
        /* Стил за таблиците (решетките) */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 12px; background: rgba(255, 255, 255, 0.02); }
        th { background: #ff0000; color: white; text-transform: uppercase; padding: 8px; border: 1px solid #400000; }
        td { padding: 8px; border: 1px solid rgba(255, 0, 0, 0.2); text-align: center; }
        tr:nth-child(even) { background: rgba(255, 0, 0, 0.05); }

        .msg-ai { background: rgba(15, 15, 15, 0.95); border-left: 4px solid #ff0000; border-radius: 0 20px 20px 20px; }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); font-weight: bold; border-radius: 20px 20px 0 20px; }
        
        .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 0, 0, 0.2); transition: 0.3s; color: #ccc; }
        .action-btn:hover { background: #ff0000; color: white; border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
    </style>
</head>
<body class="flex items-center justify-center p-2 sm:p-4">

    <div class="apex-card w-full max-w-xl h-[96vh] rounded-[2.5rem] flex flex-col relative overflow-hidden">
        
        <div class="p-6 border-b border-white/5 flex items-center justify-between bg-black/80">
            <div class="flex items-center gap-4">
                <img src="/static/logo.png" onerror="this.src='https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png'" class="w-12 h-12 object-contain drop-shadow-[0_0_10px_#ff0000]">
                <div>
                    <h1 class="neon-red text-lg tracking-tighter uppercase">APEX MIND</h1>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                        <p class="text-[8px] text-gray-400 uppercase tracking-[3px]">Olympia Protocol Active</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
            <div class="animate__animated animate__fadeInLeft">
                <div class="msg-ai p-5 shadow-2xl border border-white/5">
                    <p class="text-red-500 font-bold text-[10px] tracking-widest mb-2 uppercase">Welcome back, Athlete</p>
                    <p class="text-sm">Готов съм. Дай ми данните си или задай въпрос, за да генерирам твоя елитен план. 🦾🔱</p>
                </div>
            </div>
        </div>

        <div id="utility-bar" class="px-6 py-2 flex gap-2 hidden">
            <button onclick="copyContent()" class="action-btn flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">📋 Копирай плана</button>
            <button onclick="window.print()" class="action-btn flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">💾 Запази като PDF</button>
        </div>

        <div class="p-6 bg-black/90">
            <div class="flex items-center gap-3 bg-[#0a0a0a] p-2 rounded-2xl border border-white/10 focus-within:border-red-600 transition-all shadow-2xl">
                <input type="text" id="user-input" class="flex-1 bg-transparent py-3 px-4 text-sm focus:outline-none placeholder:text-gray-700" placeholder="Въведи запитване...">
                <button onclick="sendMessage()" class="bg-red-600 p-4 rounded-xl hover:bg-red-700 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,0,0,0.4)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let fullText = "";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;
            input.value = '';

            render(msg, 'user');
            
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                fullText = data.reply;
                render(data.reply, 'ai');
                document.getElementById('utility-bar').classList.remove('hidden');
            } catch(e) {
                render("Critical Error: Връзката прекъсна. 🔴", 'ai');
            }
        }

        function render(text, type) {
            const container = document.getElementById('chat-container');
            const isU = type === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isU ? 'justify-end' : 'justify-start'} animate__animated ${isU ? 'animate__fadeInUp' : 'animate__fadeInLeft'}`;
            
            // Превръщаме Markdown таблиците в HTML таблици автоматично
            let formattedText = text.replace(/\|(.+)\|/g, (match) => {
                return match; // Тук може да се добави по-сложен парсър, но OpenAI праща чист Markdown
            });

            div.innerHTML = `<div class="${isU ? 'msg-user' : 'msg-ai'} p-5 max-w-[95%] text-sm shadow-2xl whitespace-pre-wrap">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function copyContent() {
            navigator.clipboard.writeText(fullText);
            alert("Планът е копиран! Сега можеш да го поставиш в Notes или Messenger. ✅");
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
