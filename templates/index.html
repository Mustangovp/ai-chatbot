<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX MIND | ELITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; }
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; 
        }
        .apex-card { 
            flex: 1; display: flex; flex-direction: column; border: 2px solid #ff0000; 
            background: #050505; margin: 5px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 25px rgba(255,0,0,0.3); 
        }
        .neon-red { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-family: 'Orbitron'; text-transform: uppercase; }
        
        /* ПЕРФЕКТНАТА ЧЕРВЕНА ТАБЛИЦА */
        .msg-content table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 2px solid #ff0000; background: rgba(20, 0, 0, 0.9); }
        .msg-content th { background: #ff0000; color: #fff; padding: 12px; font-size: 11px; text-transform: uppercase; border: 1px solid #440000; }
        .msg-content td { border: 1px solid #440000; padding: 10px; font-size: 11px; text-align: center; color: #fff; font-weight: 500; }
        .msg-content tr:nth-child(even) { background: rgba(255, 0, 0, 0.1); }
        .msg-content h3 { color: #ff0000 !important; font-weight: bold; font-size: 1.3rem; margin-top: 10px; border-bottom: 2px solid #222; padding-bottom: 5px; }

        .msg-ai { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #ff0000; border-radius: 0 15px 15px 15px; }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); border-radius: 15px 15px 0 15px; font-weight: bold; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .input-area { background: #000; padding: 15px; border-top: 1px solid rgba(255,0,0,0.3); }

        /* PREMIUM LOCK */
        .locked-tools { opacity: 0.4; filter: grayscale(1) blur(1px); pointer-events: none; }
        .pay-btn { background: rgba(255, 0, 0, 0.15); border: 1px solid #ff0000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

    <div class="apex-card">
        <div class="p-4 border-b border-red-900/40 flex items-center justify-between bg-black">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png" class="w-12 h-12 object-contain shadow-[0_0_12px_#ff0000]">
                <div>
                    <h1 class="neon-red text-base tracking-widest leading-none">APEX MIND</h1>
                    <p id="counter" class="text-[8px] text-red-500 font-bold tracking-[3px] mt-1 uppercase">● 3 FREE SESSIONS LEFT</p>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div id="utility" class="px-4 py-2 hidden">
            <div id="lock-layer" class="flex gap-2 locked-tools mb-2">
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] uppercase font-bold text-gray-500">📋 Копирай плана</button>
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] uppercase font-bold text-gray-500">💾 Запази (PDF)</button>
            </div>
            <button onclick="alert('Плащане: 1.99€ за отключване')" class="pay-btn w-full py-2 rounded-lg text-[9px] uppercase font-bold tracking-widest text-white">
                🔓 ОТКЛЮЧИ ИНСТРУМЕНТИТЕ ЗА 1.99€
            </button>
        </div>

        <div class="input-area">
            <div class="flex items-center gap-2 bg-[#111] p-1 rounded-2xl border border-white/10 focus-within:border-red-600">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Въведи цел (напр. План за маса)...">
                <button onclick="process()" class="bg-red-600 p-4 rounded-xl shadow-[0_0_15px_#f00] active:scale-90 transition-all">
                    <svg class="h-6 w-6 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Фикс за височина на мобилни браузъри
        const vhFix = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', vhFix); vhFix();

        let usedSessions = 0;
        let lastResponse = "";
        const box = document.getElementById('chat-box');
        const input = document.getElementById('user-in');

        // Автоматично въведение
        window.onload = () => {
            const intro = `### ДОБРЕ ДОШЪЛ В ЕЛИТА 🔱
Аз съм твоят AI ментор за професионална подготовка.

**Възможности на системата:**
* 🦾 **Тренировъчни схеми** (Таблици)
* 🥗 **Прецизно хранене** (Макроси)
* 📈 **Стратегия за прогрес**

Имаш **3 безплатни аналитични сесии**. Напиши целта си под текста. 🔥`;
            append(intro, 'ai');
        };

        async function process() {
            const val = input.value.trim();
            if(!val || usedSessions >= 3) return;
            input.value = ''; usedSessions++;
            
            document.getElementById('counter').innerText = `● ${3 - usedSessions} FREE SESSIONS LEFT`;
            if(usedSessions === 3) document.getElementById('counter').innerText = "● LIMIT REACHED";

            append(val, 'user');
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                lastResponse = data.reply;
                append(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) { append("Системна грешка. Провери връзката. 🔴", 'ai'); }
        }

        function append(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const content = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-5 max-w-[92%] text-sm msg-content shadow-2xl">${content}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        input.onkeypress = (e) => { if(e.key === 'Enter') process(); };
    </script>
</body>
</html>
