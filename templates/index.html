<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX MIND | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; }
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column;
        }
        .apex-card { 
            flex: 1; display: flex; flex-direction: column;
            border: 1px solid #ff0000; background: #050505; margin: 5px; border-radius: 20px; overflow: hidden;
        }
        .neon-red { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-family: 'Orbitron'; text-transform: uppercase; }
        
        /* ЯРЪК ТЕКСТ ЗА СЪОБЩЕНИЯТА */
        .msg-content { color: #ffffff !important; line-height: 1.6; }
        .msg-content h3 { color: #ff0000 !important; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        .msg-content strong { color: #ff4d4d !important; }
        .msg-content li { margin-bottom: 5px; list-style-type: disc; margin-left: 20px; }

        .msg-ai { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #ff0000; border-radius: 0 15px 15px 15px; }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); border-radius: 15px 15px 0 15px; font-weight: bold; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .input-area { background: #000; padding: 15px; border-top: 1px solid rgba(255,0,0,0.2); }
    </style>
</head>
<body>

    <div class="apex-card">
        <div class="p-4 border-b border-white/5 flex items-center justify-between bg-black">
            <div class="flex items-center gap-3">
                <img src="/static/logo.png" onerror="this.src='https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png'" class="w-10 h-10 object-contain shadow-[0_0_10px_#ff0000]">
                <div>
                    <h1 class="neon-red text-base tracking-widest">APEX MIND</h1>
                    <p class="text-[8px] text-red-500 font-bold tracking-[3px]">● 3 FREE SESSIONS LEFT</p>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <div class="flex items-center gap-2 bg-[#111] p-1 rounded-2xl border border-white/10 focus-within:border-red-600">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white font-medium" placeholder="Въведи цел (напр. План за сила)...">
                <button onclick="sendAction()" class="bg-red-600 p-3 rounded-xl shadow-[0_0_15px_rgba(255,0,0,0.5)]">
                    <svg class="h-6 w-6 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let msgCount = 0;
        const chatBox = document.getElementById('chat-box');
        const userIn = document.getElementById('user-in');

        window.onload = () => {
            appendMsg("### ДОБРЕ ДОШЪЛ В ЕЛИТА 🔱\nАз съм твоят AI ментор. Тук сме за **резултати**, а не за извинения. 🔥\n\n**Какво правим днес?**\n* Професионален тренировъчен план\n* Хранителен режим за маса/релеф\n* Пълна трансформация\n\n*Имаш 3 безплатни сесии. Дай газ!* 🚀", 'ai');
        };

        async function sendAction() {
            const val = userIn.value.trim();
            if(!val || msgCount >= 3) return;
            userIn.value = ''; msgCount++;
            
            appendMsg(val, 'user');
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
            } catch(e) { appendMsg("Грешка в системата. 🔴", 'ai'); }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const formatted = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-5 max-w-[90%] text-sm msg-content shadow-2xl">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        userIn.onkeypress = (e) => { if(e.key === 'Enter') sendAction(); };
    </script>
</body>
</html>
