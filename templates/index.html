<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX PULSE | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; --neon: #ff0000; }
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            height: calc(var(--vh) * 100); overflow: hidden; margin: 0; 
            display: flex; flex-direction: column; 
        }

        .app-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; overflow: hidden; }
        
        /* ФОНОВО ЛОГО */
        .bg-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; opacity: 0.1; z-index: 0; pointer-events: none; }

        /* ЧАТ ЗОНА - ФИКС ЗА РЯЗАНЕТО */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 1; margin-bottom: 5px; }

        /* ТАБЛИЦИ */
        .msg-ai table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid rgba(57, 255, 20, 0.3); font-size: 11px; background: rgba(0,0,0,0.4); }
        .msg-ai th { background: rgba(57, 255, 20, 0.1); color: #39ff14; padding: 10px; text-transform: uppercase; font-size: 9px; border-bottom: 1px solid #39ff14; }
        .msg-ai td { border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; padding: 10px; text-align: center; }

        .msg-ai { background: rgba(20, 20, 20, 0.9); border-left: 3px solid var(--neon); border-radius: 0 20px 20px 20px; padding: 15px; }
        .msg-user { background: linear-gradient(135deg, #ff0000 0%, #800000 100%); border-radius: 20px 20px 0 20px; padding: 12px 18px; align-self: flex-end; font-weight: 700; }

        /* FOOTER & PAYWALL */
        .legal-footer { background: #000; padding: 10px; text-align: center; font-size: 8px; color: #444; border-top: 1px solid #111; z-index: 10; }
        .legal-footer a { margin: 0 8px; text-transform: uppercase; cursor: pointer; }
        .legal-footer a:hover { color: var(--neon); }

        #paywall { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .premium-card { background: #0a0a0a; border: 2px solid var(--neon); padding: 40px; border-radius: 40px; text-align: center; max-width: 340px; width: 100%; }

        #legal-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <img src="{{ url_for('static', filename='logo.png') }}" class="bg-logo">

        <header class="p-4 border-b border-white/5 bg-black/60 flex items-center justify-between z-10">
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='logo.png') }}" class="w-8 h-8 rounded-full border border-red-600">
                <div>
                    <h1 class="text-red-600 font-bold tracking-[2px] text-xs uppercase font-['Orbitron']">APEX PULSE PRO</h1>
                    <p id="counter" class="text-[7px] text-gray-500 font-bold uppercase">3 Сесии Остават</p>
                </div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer class="p-4 bg-black/90 z-10">
            <div class="flex items-center gap-2 bg-white/5 rounded-2xl p-1 border border-white/10 focus-within:border-red-600 transition-all">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Цел...">
                <button onclick="send()" class="bg-red-600 p-4 rounded-xl shadow-lg"><svg class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
        </footer>

        <div class="legal-footer">
            <a onclick="showLegal('terms')">Общи Условия</a>
            <a onclick="showLegal('privacy')">Поверителност</a>
            <a onclick="showLegal('contact')">Контакт</a>
            <div class="mt-1 opacity-50">© 2024 APEX PULSE PRO. Сигурни плащания чрез Stripe.</div>
        </div>
    </div>

    <div id="paywall">
        <div class="premium-card">
            <h2 class="text-red-600 font-bold mb-4 font-['Orbitron'] tracking-tighter">ELITE UNLOCK</h2>
            <div class="text-5xl font-black mb-2 tracking-tighter text-white">1.99€</div>
            <p class="text-[11px] text-white font-bold mb-1 uppercase tracking-widest">ПЪЛЕН ДОСТЪП ЗА 30 ДНИ</p>
            <p class="text-[9px] text-gray-500 mb-8 px-6">Неограничени планове, тренировки и AI поддръжка за един месец.</p>
            <button onclick="pay()" class="w-full bg-red-600 py-4 rounded-2xl font-bold uppercase shadow-lg shadow-red-600/20 active:scale-95 transition-transform">ОТКЛЮЧИ СЕГА</button>
            <p class="text-[7px] text-gray-700 mt-6 uppercase">Еднократно плащане. Без автоматични абонаменти.</p>
        </div>
    </div>

    <div id="legal-modal">
        <button onclick="this.parentElement.style.display='none'" class="text-red-600 font-bold mb-6">[ ЗАТВОРИ ]</button>
        <div id="legal-content" class="text-gray-400 text-[10px] leading-relaxed"></div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let count = 0;
        const box = document.getElementById('chat-box');

        window.onload = () => {
            appendMsg("### СИСТЕМАТА Е АКТИВНА 🔱\nДобре дошъл в **APEX PULSE PRO**. Готов ли си за 30-дневна трансформация?", 'ai');
        };

        async function send() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val) return;
            if(count >= 3) { document.getElementById('paywall').style.display = 'flex'; return; }
            
            appendMsg(val, 'user');
            input.value = ''; count++;
            document.getElementById('counter').innerText = `${3 - count} Сесии Остават`;

            try {
                const res = await fetch("/chat", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ message: val }) });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
            } catch(e) { appendMsg("Грешка в ядрото. ⚡", 'ai'); }
        }

        async function pay() {
            const res = await fetch("/create-checkout-session", { method: "POST" });
            const data = await res.json();
            window.location.href = data.url;
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = type === 'user' ? 'msg-user' : 'msg-ai';
            div.innerHTML = type === 'user' ? text : marked.parse(text);
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function showLegal(type) {
            const modal = document.getElementById('legal-modal');
            const content = document.getElementById('legal-content');
            if(type === 'terms') content.innerHTML = "<h3>ОБЩИ УСЛОВИЯ</h3><p>С плащането на такса от 1.99€, потребителят получава достъп до софтуерната услуга APEX PULSE PRO за период от 30 календарни дни. Услугата предоставя AI-генерирана информация за фитнес и хранене...</p>";
            if(type === 'privacy') content.innerHTML = "<h3>ПОВЕРИТЕЛНОСТ</h3><p>Ние не съхраняваме Вашите картови данни. Плащанията се обработват сигурно от Stripe. Вашите съобщения се използват само за целите на текущата сесия...</p>";
            if(type === 'contact') content.innerHTML = "<h3>КОНТАКТ</h3><p>За въпроси: support@apexpulse.pro</p>";
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
