<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MIND | Digital Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top, #200000 0%, #000 100%);
            color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
        }
        .apex-card {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            border-radius: 20px;
        }
        .neon-title { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px #ff0000; }
        .xp-bar-bg { background: rgba(255, 255, 255, 0.05); height: 4px; border-radius: 2px; }
        .xp-bar-fill { background: linear-gradient(90deg, #ff0000, #990000); transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .msg-ai { background: rgba(255, 255, 255, 0.03); border-left: 3px solid #ff0000; border-radius: 0 15px 15px 15px; }
        .msg-user { background: #ff0000; color: #fff; border-radius: 15px 15px 0 15px; font-weight: 600; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #ff0000; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="apex-card w-full max-w-md h-[92vh] flex flex-col relative overflow-hidden">
        
        <div class="p-6 bg-black/50 border-b border-red-900/30 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img src="https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png" alt="APEX MIND" class="w-16 h-16 object-contain drop-shadow-[0_0_8px_#ff0000]">
                    <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-red-600 rounded-full animate-pulse border-2 border-black"></div>
                </div>
                <div>
                    <h1 class="neon-title text-xl tracking-widest uppercase">APEX MIND</h1>
                    <p id="rank" class="text-[9px] text-red-500 font-bold tracking-[3px] uppercase">Elite Protocol</p>
                </div>
            </div>
            <div class="text-right">
                <span id="xp-val" class="text-[10px] font-mono text-gray-500">0000 XP</span>
            </div>
        </div>

        <div class="xp-bar-bg mx-6 mt-4">
            <div id="xp-fill" class="xp-bar-fill h-full" style="width: 5%"></div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="animate__animated animate__fadeInLeft">
                <div class="msg-ai p-4 text-sm leading-relaxed border border-white/5 shadow-xl">
                    <p class="italic text-gray-400 mb-2">"Train the body. Master the mind."</p>
                    Системата е онлайн. Очаквам Вашата команда за днешната трансформация.
                </div>
            </div>
        </div>

        <div class="px-6 py-2 flex gap-2 overflow-x-auto no-scrollbar pb-3">
            <button onclick="quick('Експлозивна тренировка')" class="whitespace-nowrap bg-white/5 border border-red-600/30 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-red-600 transition-all tracking-tighter">🔥 Експлозия</button>
            <button onclick="quick('Биохакинг хранене')" class="whitespace-nowrap bg-white/5 border border-red-600/30 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-red-600 transition-all tracking-tighter">🥗 Хранене</button>
            <button onclick="quick('Желязна дисциплина')" class="whitespace-nowrap bg-white/5 border border-red-600/30 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-red-600 transition-all tracking-tighter">🦾 Дисциплина</button>
        </div>

        <div class="p-6 bg-black/40 border-t border-white/5">
            <div class="flex items-center gap-3 bg-white/5 p-1 rounded-xl border border-white/10 focus-within:border-red-600 transition-all">
                <input type="text" id="user-input" 
                    class="flex-1 bg-transparent py-3 px-4 text-sm focus:outline-none placeholder:text-gray-700"
                    placeholder="Въведете команда...">
                <button onclick="send()" class="bg-red-600 hover:bg-red-700 p-4 rounded-xl shadow-[0_0_20px_rgba(255,0,0,0.4)] active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let xp = 0;
        const box = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        async function quick(t) { input.value = t; send(); }

        async function send() {
            const val = input.value.trim();
            if(!val) return;
            input.value = '';

            render(val, 'user');
            
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                render(data.reply, 'ai');
                
                xp += 25;
                document.getElementById('xp-fill').style.width = (xp % 100) + '%';
                document.getElementById('xp-val').innerText = String(xp).padStart(4, '0') + " XP";
            } catch(e) {
                render("Връзката прекъсна. Върнете се в режим на готовност.", 'ai');
            }
        }

        function render(text, type) {
            const isU = type === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isU ? 'justify-end' : 'justify-start'} animate__animated ${isU ? 'animate__fadeInRight' : 'animate__fadeInLeft'}`;
            div.innerHTML = `<div class="${isU ? 'msg-user' : 'msg-ai'} p-4 max-w-[85%] text-sm shadow-2xl">${text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
