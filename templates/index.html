<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX MIND | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --vh: 1vh; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: calc(var(--vh) * 100); overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        .apex-card { flex: 1; display: flex; flex-direction: column; border: 1px solid #ff0000; background: #050505; margin: 5px; border-radius: 20px; overflow: hidden; }
        .neon-red { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-family: 'Orbitron'; text-transform: uppercase; }
        
        /* ГРАФИЧНА ЧЕРВЕНА ТАБЛИЦА */
        .msg-content table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid #440000; background: rgba(20, 0, 0, 0.6); }
        .msg-content th { background: #ff0000; color: white; padding: 10px; font-size: 11px; text-transform: uppercase; border: 1px solid #440000; }
        .msg-content td { border: 1px solid #440000; padding: 10px; font-size: 11px; text-align: center; color: #eee; }
        .msg-content tr:nth-child(even) { background: rgba(255, 0, 0, 0.05); }

        .msg-ai { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #ff0000; border-radius: 0 15px 15px 15px; color: #fff !important; }
        .msg-user { background: linear-gradient(90deg, #ff0000, #800000); border-radius: 15px 15px 0 15px; font-weight: bold; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .input-area { background: #000; padding: 15px; border-top: 1px solid rgba(255,0,0,0.2); }
        
        /* ПЛАТЕНИ БУТОНИ */
        .premium-lock { filter: grayscale(1) blur(1px); pointer-events: none; opacity: 0.5; }
        .pay-notice { font-size: 9px; color: #ff0000; text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="apex-card">
        <div class="p-4 border-b border-white/5 flex items-center justify-between bg-black">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png" class="w-10 h-10 object-contain shadow-[0_0_10px_#ff0000]">
                <div>
                    <h1 class="neon-red text-base tracking-widest">APEX MIND</h1>
                    <p id="counter-label" class="text-[8px] text-red-500 font-bold tracking-[3px]">● 3 FREE SESSIONS LEFT</p>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div id="utility" class="px-4 py-2 flex flex-col gap-2 hidden">
            <div class="flex gap-2 premium-lock" id="lock-layer">
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] uppercase font-bold">📋 Копирай</button>
                <button class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[9px] uppercase font-bold">💾 Запази</button>
            </div>
            <button onclick="unlockTools()" class="w-full py-1 text-[10px] text-white bg-red-900/40 rounded-lg border border-red-600 animate-pulse">
                🔓 Отключи инструментите за 1.99€
            </button>
        </div>

        <div class="input-area">
            <div class="flex items-center gap-2 bg-[#111] p-1 rounded-xl border border-white/10">
                <input type="text" id="user-in" class="flex-1 bg-transparent py-3 px-4 text-sm outline-none text-white" placeholder="Въведи цел...">
                <button onclick="sendAction()" class="bg-red-600 p-3 rounded-xl shadow-[0_0_15px_#f00]">
                    <svg class="h-6 w-6 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const setHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', setHeight); setHeight();

        let msgCount = 0;
        const chatBox = document.getElementById('chat-box');
        const userIn = document.getElementById('user-in');

        window.onload = () => {
            appendMsg("### СИСТЕМАТА Е ОНЛАЙН 🔱\nИмаш 3 безплатни сесии. Дай газ! 🚀", 'ai');
        };

        async function sendAction() {
            const val = userIn.value.trim();
            if(!val || msgCount >= 3) return;
            userIn.value = ''; 
            
            msgCount++;
            updateCounter();
            
            appendMsg(val, 'user');
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMsg(data.reply, 'ai');
                document.getElementById('utility').classList.remove('hidden');
            } catch(e) { appendMsg("System Error. 🔴", 'ai'); }
        }

        function updateCounter() {
            const left = 3 - msgCount;
            document.getElementById('counter-label').innerText = `● ${left} FREE SESSIONS LEFT`;
            if(left === 0) document.getElementById('counter-label').innerText = "● LIMIT REACHED";
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate__animated fadeInUp`;
            const formatted = type === 'user' ? text : marked.parse(text);
            div.innerHTML = `<div class="${type === 'user' ? 'msg-user' : 'msg-ai'} p-5 max-w-[90%] text-sm msg-content shadow-2xl">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function unlockTools() {
            alert("Пренасочване към плащане (1.99€)...");
            // Тук след плащане премахваш класа 'premium-lock'
        }

        userIn.onkeypress = (e) => { if(e.key === 'Enter') sendAction(); };
    </script>
</body>
</html>
