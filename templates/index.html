<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MIND | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .glass-panel { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255, 0, 0, 0.3); border-radius: 24px; }
        .apex-red { background-color: #ff0000; }
        .message-ai { background: rgba(255, 255, 255, 0.05); border-left: 3px solid #ff0000; }
        .message-user { background: #ff0000; color: white; font-weight: 500; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div class="glass-panel w-full max-w-lg h-[90vh] flex flex-col overflow-hidden shadow-2xl">
        
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://i.ibb.co/vzP6Kk6/APEX-MIND-LOGO.png" alt="APEX MIND" class="w-14 h-14 rounded-lg border border-red-600 shadow-lg">
                <div>
                    <h1 class="text-xl font-bold tracking-tight">APEX MIND</h1>
                    <p class="text-[10px] text-red-500 uppercase font-bold tracking-[0.2em]">Master the Mind</p>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <span class="text-[10px] text-gray-400 font-bold uppercase">System Active</span>
                </div>
            </div>
        </div>

        <div class="h-1 w-full bg-white/5">
            <div id="progress-bar" class="h-full apex-red transition-all duration-500" style="width: 5%"></div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="animate__animated animate__fadeIn">
                <div class="message-ai p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed">
                    Добре дошли в **APEX MIND**. Аз съм вашият виртуален треньор. 
                    Готови ли сте да започнем вашата трансформация днес?
                </div>
            </div>
        </div>

        <div class="px-6 py-2 flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button onclick="quick('Тренировъчен план')" class="whitespace-nowrap bg-white/5 hover:bg-red-600/20 border border-white/10 px-4 py-2 rounded-full text-xs transition-all">Тренировка</button>
            <button onclick="quick('Хранителен режим')" class="whitespace-nowrap bg-white/5 hover:bg-red-600/20 border border-white/10 px-4 py-2 rounded-full text-xs transition-all">Хранене</button>
            <button onclick="quick('Мотивация за деня')" class="whitespace-nowrap bg-white/5 hover:bg-red-600/20 border border-white/10 px-4 py-2 rounded-full text-xs transition-all">Мотивация</button>
        </div>

        <div class="p-6 bg-white/[0.01] border-t border-white/5">
            <div class="relative flex items-center gap-3">
                <input type="text" id="user-input" 
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl py-4 px-5 text-sm focus:outline-none focus:border-red-600 transition-all"
                    placeholder="Напишете вашето запитване тук...">
                <button onclick="send()" class="apex-red p-4 rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let xp = 0;
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');

        async function quick(text) { input.value = text; send(); }

        async function send() {
            const val = input.value.trim();
            if(!val) return;
            input.value = '';

            addMessage(val, 'user');
            
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                addMessage(data.reply, 'ai');
                
                xp += 10;
                document.getElementById('progress-bar').style.width = (xp % 100) + '%';
            } catch(e) {
                addMessage("Възникна грешка в комуникацията.", 'ai');
            }
        }

        function addMessage(text, type) {
            const isUser = type === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp`;
            div.innerHTML = `
                <div class="${isUser ? 'message-user' : 'message-ai'} p-4 rounded-2xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} max-w-[85%] text-sm shadow-sm">
                    ${text}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
